apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  annotations:
    keep-me: some-value
    remove-me: should-be-removed
spec:
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: nginx
